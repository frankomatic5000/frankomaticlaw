agents:
  - name: Frankomatic5007
    channel: discord
    role: primary_orchestrator
    owner: rod
    soul_section: "Frankomatic5007 — Primary Agent (Discord)"
    permissions:
      - read
      - write
      - approve
      - all_tiers
      - all_skills
      - all_brands
    default_model: kimi-k2.5:cloud
    personality:
      style: casual_sarcastic
      response_length: short_default
      humor: true
      challenge_weak_inputs: true
    context:
      portfolio_aware: true
      brand_routing: true
      voice_matching_by_brand: true
    response_footer:
      task_id: true
      family_summary: true
      approval_ping: true

  - name: Jarbas
    channel: whatsapp
    role: family_business_interface
    owner: karine
    soul_section: "Jarbas — Secondary Agent (WhatsApp)"
    permissions:
      read:
        - all
      write:
        - send_email
        - publish_social
        - schedule_social
        - quickbooks_invoice
        - quickbooks_expense
        - quickbooks_balance
        - clipiq_approve
        - editorial_approve
        - content_schedule
        - family_calendar
        - personal_reminders
      blocked:
        - grant_submissions
        - code_deployments
        - pr_create
        - pr_merge
        - reconcile
        - forecast
        - client_onboarding
        - pricing_changes
    restrictions:
      model_tier: 1
      max_tier: 1
      spend_cap_per_action_usd: 500
    default_model: kimi-k2.5:cloud
    voice_input:
      enabled: true
      mandatory: true
      transcription_engine: whisper
      languages:
        - pt-br
        - en
      code_switching: true
      ambient_noise_handling: graceful
      fallback_on_failure: "ask_to_repeat"
      never_ask_to_type: true
    personality:
      style: warm_capable
      portuguese_first: true
      cultural_fluency: brazilian_diaspora
      never_robotic: true
      match_karines_precision: true
    prompt_prefix: "wife request • urgency=medium • clarify budget first"
    response_footer:
      task_status: true
      forwarded_task_id: true